
<style>
#plot { position: relative; width: 100%; }
canvas#vc { width: 100%; display: block; }
.pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 0.5px solid; transition: opacity 0.15s; }
.pill:hover { opacity: 0.75; }
.eq-box { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 16px; font-size: 14px; font-family: var(--font-mono); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.eq-w { font-weight: 500; padding: 2px 8px; border-radius: 4px; font-size: 13px; }
.eq-op { color: var(--color-text-secondary); font-size: 15px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
</style>

<h2 class="sr-only">Explorador interactivo de analogías word2vec: visualiza vectores de palabras en 2D</h2>

<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
  <button class="pill" onclick="selectAnalogy(0)" id="btn0" style="background:#EEEDFE; color:#3C3489; border-color:#AFA9EC;">Rey − Hombre + Mujer</button>
  <button class="pill" onclick="selectAnalogy(1)" id="btn1" style="background:#E1F5EE; color:#085041; border-color:#5DCAA5;">Príncipe − Niño + Niña</button>
  <button class="pill" onclick="selectAnalogy(2)" id="btn2" style="background:#FAEEDA; color:#633806; border-color:#EF9F27;">Actor − Hombre + Mujer</button>
  <button class="pill" onclick="selectAnalogy(3)" id="btn3" style="background:#FAECE7; color:#712B13; border-color:#F0997B;">París − Francia + Alemania</button>
</div>

<div class="eq-box" id="eq-display">
  <span class="eq-w" id="eq-a" style="background:#CECBF6; color:#26215C;">Rey</span>
  <span class="eq-op">−</span>
  <span class="eq-w" id="eq-b" style="background:#D3D1C7; color:#2C2C2A;">Hombre</span>
  <span class="eq-op">+</span>
  <span class="eq-w" id="eq-c" style="background:#D3D1C7; color:#2C2C2A;">Mujer</span>
  <span class="eq-op">≈</span>
  <span class="eq-w" id="eq-r" style="background:#7F77DD; color:#EEEDFE;">Reina ✓</span>
</div>

<div id="plot">
  <canvas id="vc" height="400"></canvas>
</div>

<div style="display:flex; gap:16px; flex-wrap:wrap; margin-top:10px; font-size:12px; color:var(--color-text-secondary);">
  <span><span class="legend-dot" style="background:#7F77DD;"></span>Resultado predicho</span>
  <span><span class="legend-dot" style="background:#5DCAA5;"></span>Palabra A (base)</span>
  <span><span class="legend-dot" style="background:#888780;"></span>Palabras B y C</span>
  <span style="display:flex;align-items:center;gap:4px;"><svg width="24" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="4 2"/></svg> vector de analogía</span>
</div>

<script>
const analogies = [
  {
    a:'Rey', b:'Hombre', c:'Mujer', r:'Reina',
    label: 'Rey − Hombre + Mujer ≈ Reina',
    axis1: 'eje género →', axis2: '↑ eje realeza',
    words: {
      'Rey':    {x:0.15, y:0.82},
      'Reina':  {x:0.72, y:0.82},
      'Príncipe':{x:0.12, y:0.60},
      'Princesa':{x:0.68, y:0.60},
      'Hombre': {x:0.18, y:0.26},
      'Mujer':  {x:0.73, y:0.26},
      'Niño':   {x:0.22, y:0.10},
      'Niña':   {x:0.68, y:0.10},
    },
    colors: {Rey:'#7F77DD', Reina:'#7F77DD', Hombre:'#888780', Mujer:'#888780',
             Príncipe:'#AFA9EC', Princesa:'#AFA9EC', Niño:'#B4B2A9', Niña:'#B4B2A9'},
    eqStyle: {a:'background:#CECBF6;color:#26215C', b:'background:#D3D1C7;color:#2C2C2A', c:'background:#D3D1C7;color:#2C2C2A', r:'background:#7F77DD;color:#EEEDFE'}
  },
  {
    a:'Príncipe', b:'Niño', c:'Niña', r:'Princesa',
    label: 'Príncipe − Niño + Niña ≈ Princesa',
    axis1: 'eje género →', axis2: '↑ eje realeza',
    words: {
      'Rey':    {x:0.15, y:0.88},
      'Reina':  {x:0.72, y:0.88},
      'Príncipe':{x:0.18, y:0.60},
      'Princesa':{x:0.72, y:0.60},
      'Hombre': {x:0.18, y:0.26},
      'Mujer':  {x:0.73, y:0.26},
      'Niño':   {x:0.22, y:0.10},
      'Niña':   {x:0.68, y:0.10},
    },
    colors: {Príncipe:'#5DCAA5', Princesa:'#5DCAA5', Niño:'#888780', Niña:'#888780',
             Rey:'#9FE1CB', Reina:'#9FE1CB', Hombre:'#B4B2A9', Mujer:'#B4B2A9'},
    eqStyle: {a:'background:#9FE1CB;color:#04342C', b:'background:#D3D1C7;color:#2C2C2A', c:'background:#D3D1C7;color:#2C2C2A', r:'background:#1D9E75;color:#E1F5EE'}
  },
  {
    a:'Actor', b:'Hombre', c:'Mujer', r:'Actriz',
    label: 'Actor − Hombre + Mujer ≈ Actriz',
    axis1: 'eje género →', axis2: '↑ eje profesión/artes',
    words: {
      'Actor':   {x:0.20, y:0.72},
      'Actriz':  {x:0.72, y:0.72},
      'Escritor':{x:0.22, y:0.52},
      'Escritora':{x:0.68, y:0.52},
      'Hombre':  {x:0.18, y:0.26},
      'Mujer':   {x:0.73, y:0.26},
      'Niño':    {x:0.22, y:0.10},
      'Niña':    {x:0.68, y:0.10},
    },
    colors: {Actor:'#EF9F27', Actriz:'#EF9F27', Hombre:'#888780', Mujer:'#888780',
             Escritor:'#FAC775', Escritora:'#FAC775', Niño:'#B4B2A9', Niña:'#B4B2A9'},
    eqStyle: {a:'background:#FAC775;color:#412402', b:'background:#D3D1C7;color:#2C2C2A', c:'background:#D3D1C7;color:#2C2C2A', r:'background:#EF9F27;color:#412402'}
  },
  {
    a:'París', b:'Francia', c:'Alemania', r:'Berlín',
    label: 'París − Francia + Alemania ≈ Berlín',
    axis1: 'dimensión país →', axis2: '↑ dimensión capital',
    words: {
      'París':   {x:0.20, y:0.78},
      'Berlín':  {x:0.65, y:0.78},
      'Madrid':  {x:0.42, y:0.78},
      'Francia': {x:0.20, y:0.28},
      'Alemania':{x:0.65, y:0.28},
      'España':  {x:0.42, y:0.28},
      'Europa':  {x:0.42, y:0.10},
    },
    colors: {París:'#D85A30', Berlín:'#D85A30', Francia:'#888780', Alemania:'#888780',
             Madrid:'#F0997B', España:'#B4B2A9', Europa:'#B4B2A9'},
    eqStyle: {a:'background:#F5C4B3;color:#4A1B0C', b:'background:#D3D1C7;color:#2C2C2A', c:'background:#D3D1C7;color:#2C2C2A', r:'background:#D85A30;color:#FAECE7'}
  }
];

let currentIdx = 0;
let animFrame = 0;
let animProgress = 0;
let animating = false;

const canvas = document.getElementById('vc');
const ctx = canvas.getContext('2d');

function getSize() {
  const w = canvas.parentElement.offsetWidth;
  return { W: w, H: Math.round(w * 0.55) };
}

function toCanvas(nx, ny, W, H) {
  const pad = { l: 48, r: 24, t: 28, b: 36 };
  return {
    x: pad.l + nx * (W - pad.l - pad.r),
    y: pad.t + (1 - ny) * (H - pad.t - pad.b)
  };
}

function drawArrow(x1, y1, x2, y2, color, dashed, alpha, width) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = width || 1.5;
  if (dashed) ctx.setLineDash([5, 3]);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const hs = 7;
  ctx.setLineDash([]);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hs * Math.cos(angle - 0.4), y2 - hs * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - hs * Math.cos(angle + 0.4), y2 - hs * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function draw(progress) {
  const an = analogies[currentIdx];
  const { W, H } = getSize();
  canvas.width = W;
  canvas.height = H;

  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const textCol = isDark ? 'rgba(194,192,182,0.9)' : 'rgba(61,61,58,0.9)';
  const gridCol = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
  const axisCol = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';

  ctx.clearRect(0, 0, W, H);

  const pad = { l: 48, r: 24, t: 28, b: 36 };
  for (let i = 0; i <= 4; i++) {
    const x = pad.l + (i / 4) * (W - pad.l - pad.r);
    const y = pad.t + (i / 4) * (H - pad.t - pad.b);
    ctx.strokeStyle = gridCol;
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, H - pad.b); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  }
  ctx.strokeStyle = axisCol; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, H - pad.b); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.l, H - pad.b); ctx.lineTo(W - pad.r, H - pad.b); ctx.stroke();

  ctx.font = '11px system-ui, sans-serif';
  ctx.fillStyle = isDark ? 'rgba(194,192,182,0.5)' : 'rgba(100,100,96,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText(an.axis1, pad.l + (W - pad.l - pad.r) / 2, H - 6);
  ctx.save(); ctx.translate(13, pad.t + (H - pad.t - pad.b) / 2);
  ctx.rotate(-Math.PI / 2); ctx.fillText(an.axis2, 0, 0); ctx.restore();

  const pa = toCanvas(an.words[an.a].x, an.words[an.a].y, W, H);
  const pb = toCanvas(an.words[an.b].x, an.words[an.b].y, W, H);
  const pc = toCanvas(an.words[an.c].x, an.words[an.c].y, W, H);
  const pr = toCanvas(an.words[an.r].x, an.words[an.r].y, W, H);

  const t = Math.min(progress, 1);
  const t2 = Math.max(0, Math.min((progress - 0.4) / 0.6, 1));

  if (t > 0) {
    const mx = pa.x + (pb.x - pa.x) * t;
    const my = pa.y + (pb.y - pa.y) * t;
    drawArrow(pa.x, pa.y, mx, my, '#888780', true, 0.6 * t, 1.2);
    if (t >= 1) {
      const nx2 = pr.x - pc.x + pb.x;
      const ny2 = pr.y - pc.y + pb.y;
      const mx2 = nx2 + (pc.x - nx2) * t2;
      const my2 = ny2 + (pc.y - ny2) * t2;
      drawArrow(nx2, ny2, mx2, my2, '#888780', true, 0.6 * t2, 1.2);
    }
  }

  const pureVecX = (an.words[an.a].x - an.words[an.b].x);
  const pureVecY = (an.words[an.a].y - an.words[an.b].y);
  const sc = toCanvas(an.words[an.c].x, an.words[an.c].y, W, H);
  const er = toCanvas(an.words[an.c].x + pureVecX, an.words[an.c].y + pureVecY, W, H);

  if (t2 > 0) {
    const mx3 = sc.x + (er.x - sc.x) * t2;
    const my3 = sc.y + (er.y - sc.y) * t2;
    drawArrow(sc.x, sc.y, mx3, my3, an.colors[an.r] || '#7F77DD', true, 0.85 * t2, 2);
  }

  drawArrow(pb.x, pb.y, pa.x, pa.y, an.colors[an.a] || '#7F77DD', false, 0.8, 2);

  for (const [word, pos] of Object.entries(an.words)) {
    const p = toCanvas(pos.x, pos.y, W, H);
    const col = an.colors[word] || '#888780';
    const isKey = [an.a, an.b, an.c, an.r].includes(word);
    const r = isKey ? 7 : 5;

    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.fill();
    if (word === an.r) {
      ctx.strokeStyle = col;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r + 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.font = `${isKey ? '500 ' : ''}13px system-ui, sans-serif`;
    ctx.fillStyle = textCol;
    ctx.textAlign = 'center';
    const offsetY = pos.y > 0.5 ? -14 : 16;
    const lbl = word === an.r ? word + ' ✓' : word;
    ctx.fillText(lbl, p.x, p.y + offsetY);
  }
}

function animate() {
  animProgress += 0.018;
  draw(animProgress);
  if (animProgress < 2) {
    animFrame = requestAnimationFrame(animate);
  } else {
    animating = false;
    draw(2);
  }
}

function selectAnalogy(idx) {
  cancelAnimationFrame(animFrame);
  currentIdx = idx;
  animProgress = 0;
  animating = true;

  const an = analogies[idx];
  document.getElementById('eq-a').textContent = an.a;
  document.getElementById('eq-b').textContent = an.b;
  document.getElementById('eq-c').textContent = an.c;
  document.getElementById('eq-r').textContent = an.r + ' ✓';
  const s = an.eqStyle;
  document.getElementById('eq-a').style.cssText = s.a;
  document.getElementById('eq-b').style.cssText = s.b;
  document.getElementById('eq-c').style.cssText = s.c;
  document.getElementById('eq-r').style.cssText = s.r;

  for (let i = 0; i < 4; i++) {
    document.getElementById('btn' + i).style.opacity = i === idx ? '1' : '0.45';
  }
  animate();
}

window.addEventListener('resize', () => { draw(animProgress >= 2 ? 2 : animProgress); });
selectAnalogy(0);
</script>
